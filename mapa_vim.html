        @media (max-width: 1024px) {
            #main-app { flex-direction: column; }
            #sidebar { width: 100%; height: 50%; border-left: none; }
            #map-container { height: 50%; }
        }

        /* Burbuja Proporcional */
        .state-bubble {
            background: rgba(239, 68, 68, 0.75);
            border: 2px solid #ffffff;
            border-radius: 50%;
            color: white;
            font-weight: 800;
            display: flex;
            align-items: center;

        .leader-card { border-left: 6px solid #ef4444; transition: all 0.2s; cursor: pointer; }
        .leader-card:hover { transform: translateX(8px); background-color: #fef2f2; }
        .leader-card.active-card { border-left-color: #1e293b; background-color: #f8fafc; outline: 2px solid #ef4444; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .link-icon { color: #2563eb; font-weight: 700; text-decoration: underline; font-size: 11px; display: inline-flex; align-items: center; gap: 4px; }
        .link-icon:hover { color: #1d4ed8; }
        
        /* Marcador resaltado fijo (sin animación) */
        .highlighted-pin { stroke: #1e293b; stroke-width: 4px; }
    </style>
</head>

        const stateCenters = {
            "Colima": [19.2, -103.7], "Oaxaca": [17.0, -96.7], "San Luis Potosí": [22.1, -101.0],
            "Tlaxcala": [19.3, -98.2], "Nayarit": [21.7, -104.9], "Querétaro": [20.6, -100.4],
            "Morelos": [18.7, -99.1], "Estado de México": [19.4, -99.3], "CDMX": [19.25, -99.1],
            "Puebla": [18.8, -98.0], "Jalisco": [20.6, -103.3], "Yucatán": [20.9, -89.6],
            "Guerrero": [17.6, -99.5], "Guanajuato": [21.0, -101.3], "Hidalgo": [20.1, -98.8]
        };

        // --- ENFOQUE MÉXICO OPTIMIZADO (PRECISO A ZOOMMEXICO.JPG) ---
        const MEXICO_BOUNDS = [
            [13.5, -118.5], // Extremo Suroeste
            [33.5, -85.5]   // Extremo Noreste
        ];
        const MEXICO_CENTER = [23.8, -102.2]; // Centro ajustado para protagonismo nacional
        const MEXICO_ZOOM = 5.2;

        let map, geojsonLayer, bubblesLayer, pinsLayer;
        let pendingHighlightId = null;

        function init() {
            map = L.map('map', { 
                zoomSnap: 0.1, 
                attributionControl: false, 
                minZoom: 5.0, 
                maxZoom: 14, 
                maxBounds: MEXICO_BOUNDS, 
                maxBoundsViscosity: 1.0 
            });
            
            // Establecer vista inicial exacta
            map.setView(MEXICO_CENTER, MEXICO_ZOOM);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

            bubblesLayer = L.layerGroup().addTo(map);
            pinsLayer = L.layerGroup().addTo(map);

            fetch('https://raw.githubusercontent.com/angelnmara/geojson-mexico/master/mexico.json')
                .then(res => res.json())
                .then(data => {
                    geojsonLayer = L.geoJson(data, {
                        style: (f) => ({ fillColor: '#ef4444', weight: 1.2, opacity: 0.5, color: 'white', fillOpacity: 0.015 }),
                        onEachFeature: (f, layer) => {
                            layer.on('click', () => {
                                map.fitBounds(layer.getBounds(), { padding: [40, 40] });
                                filterListByState(f.properties.name);
                            });
                        }
                    }).addTo(map);
                    updateView();
                });

            map.on('zoomend', updateView);
            renderCards(leadersData); 
        }

        function updateView() {
            const zoom = map.getZoom();
            bubblesLayer.clearLayers();
            pinsLayer.clearLayers();

            if (zoom < 7.8) {
                Object.keys(stateCenters).forEach(state => {
                    const count = leadersData.filter(d => d.estado === state).length;
                    if (count > 0) {
                        const size = 35 + (count * 7); 
                        const bubble = L.marker(stateCenters[state], {
                            icon: L.divIcon({
                                className: '',
                                html: `<div class="state-bubble" style="width:${size}px; height:${size}px; font-size:${11 + count}px;">${count}</div>`,
                                iconSize: [size, size]
                            })
                        });
                        bubble.on('click', () => {
                            map.setView(stateCenters[state], 8.5);
                            filterListByState(state);
                        });
                        bubble.addTo(bubblesLayer);
                    }
                });
            } else {
                leadersData.forEach(item => {
                    if (item.coords) {
                        const isHighlighted = pendingHighlightId === item.id;
                        const pin = L.circleMarker(item.coords, {
                            radius: isHighlighted ? 12 : 9, 
                            fillColor: "#ef4444", 
                            color: isHighlighted ? "#1e293b" : "#fff", 
                            weight: isHighlighted ? 4 : 3, 
                            opacity: 1, 
                            fillOpacity: 1.0,
                            className: isHighlighted ? 'highlighted-pin' : ''
                        });
                        
                        pin.bindPopup(`<strong>${item.sede}</strong><br>${item.lider}<br><small>${item.tel}</small>`, { closeButton: false });
                        
                        pin.on('click', () => {
                            highlightCard(item.id);
                            renderCards([item], item.sede);
                        });
                        
                        pin.addTo(pinsLayer);
                        
                        if (isHighlighted) {
                            pin.openPopup();
                            pendingHighlightId = null; 
                        }
                    }
                });
            }
        }

        // ACCIÓN RECÍPROCA MEJORADA: Pin Fijo
        function focusOnLeader(id) {
            const leader = leadersData.find(l => l.id === id);
            if (!leader || !leader.coords) return;

            highlightCard(id);
            pendingHighlightId = id;
            
            // Viajar con suavidad
            map.flyTo(leader.coords, 11, { duration: 1.2 });
        }

        function highlightCard(id) {
            document.querySelectorAll('.leader-card').forEach(c => c.classList.remove('active-card'));
            const selectedCard = document.getElementById(`card-${id}`);
            if (selectedCard) {
                selectedCard.classList.add('active-card');
                selectedCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function filterListByState(stateName) {
            const normalized = stateName.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const filtered = leadersData.filter(d => d.estado.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes(normalized));
            renderCards(filtered, stateName);
        }

        function renderCards(items, title = "Directorio Nacional") {
            const container = document.getElementById('results-area');
            container.innerHTML = `<h2 class="text-xl font-black text-slate-800 border-b-4 border-red-50 pb-2 mb-6 uppercase tracking-tighter">${title}</h2>`;
            
            if (items.length === 0) {
                container.innerHTML += `<p class="text-slate-400 italic">Sin resultados.</p>`;
                return;
            }

            items.forEach(item => {
                const card = document.createElement('div');
                card.id = `card-${item.id}`;
                card.className = "leader-card bg-white rounded-3xl p-5 border border-slate-100 shadow-sm mb-4";
                card.onclick = () => focusOnLeader(item.id);
                
                let links = "";
                if (item.redes) {
                    item.redes.forEach(url => {
                        links += `
                        <a href="${url}" target="_blank" class="link-icon" onclick="event.stopPropagation()">
                            <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M22.675 0h-21.35c-.732 0-1.325.593-1.325 1.325v21.351c0 .731.593 1.324 1.325 1.324h11.495v-9.294h-3.128v-3.622h3.128v-2.671c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12v9.293h6.116c.73 0 1.323-.593 1.323-1.325v-21.35c0-.732-.593-1.325-1.325-1.325z"/></svg>
                            Facebook / Red Social
                        </a>`;
                    });
                }

                card.innerHTML = `
                    <div class="mb-3">
                        <span class="text-[8px] font-black uppercase text-red-600 bg-red-50 px-2 py-0.5 rounded tracking-widest leading-loose">${item.estado} / ${item.sede}</span>
                        <h3 class="text-lg font-bold text-slate-800 mt-1">${item.lider}</h3>
                    </div>
                    <div class="space-y-3">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 bg-slate-50 rounded-full flex items-center justify-center border border-slate-100 text-slate-400">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                            </div>
                            <a href="tel:${item.tel}" class="text-sm font-black text-red-600 hover:underline transition-all" onclick="event.stopPropagation()">${item.tel}</a>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <p class="text-[9px] text-slate-400 font-black uppercase mb-1 italic">Entrenamiento:</p>
                            <p class="text-[11px] text-slate-700 leading-snug font-medium">${item.ent}</p>
                        </div>
                        <div class="flex flex-wrap gap-4 pt-2 border-t border-slate-100">
                            ${links || '<span class="text-[10px] text-slate-400 italic">Redes no disponibles</span>'}
                            ${item.correo !== "No disponible" ? `<a href="mailto:${item.correo}" class="text-[11px] font-bold text-slate-500 hover:text-red-600 transition-all uppercase tracking-tighter" onclick="event.stopPropagation()">📧 E-mail</a>` : ''}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterList() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const results = leadersData.filter(d => 
                d.lider.toLowerCase().includes(query) || 
                d.estado.toLowerCase().includes(query) || 
                d.sede.toLowerCase().includes(query)
            );
            renderCards(results, query ? "Resultados Filtrados" : "Directorio Nacional");
        }

        function resetMapView() {
            map.flyTo(MEXICO_CENTER, MEXICO_ZOOM, { duration: 1 });
            renderCards(leadersData);
            document.querySelectorAll('.leader-card').forEach(c => c.classList.remove('active-card'));
        }

        function showVirtual() {
            renderCards([virtualLeader], "Sede Virtual");
            map.flyTo(MEXICO_CENTER, MEXICO_ZOOM);
        }

        window.onload = init;
    </script>
</body>
</html>
