            background: #ef4444;

        // --- LÓGICA DEL MAPA ---
        let map, geojsonLayer, markersLayer, clusterLayer;
        let selectedStateFeature = null;

        function initApp() {
            map = L.map('map', { zoomSnap: 0.5, attributionControl: false }).setView([23.6, -102.5], 5);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

            clusterLayer = L.layerGroup().addTo(map);
            markersLayer = L.layerGroup().addTo(map);

            // Cargar GeoJSON de México
            fetch('https://raw.githubusercontent.com/angelnmara/geojson-mexico/master/mexico.json')
                .then(res => res.json())
                .then(data => {
                    geojsonLayer = L.geoJson(data, {
                        style: (f) => {
                            const name = normalize(f.properties.name);
                            const hasLeader = Object.keys(stateCenters).some(s => normalize(s) === name);
                            return {
                                fillColor: hasLeader ? '#ef4444' : 'transparent',
                                weight: 1.5,
                                opacity: 1,
                                color: 'white',
                                fillOpacity: hasLeader ? 0.2 : 0
                            };
                        },
                        onEachFeature: (f, layer) => {
                            layer.on('click', (e) => onStateClick(f, layer));
                        }
                    }).addTo(map);
                    updateMapVisuals();
                });

            map.on('zoomend', updateMapVisuals);
        }

        function normalize(t) { return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""); }

        function onStateClick(feature, layer) {
            // Resaltar estado
            if (selectedStateFeature) {
                geojsonLayer.resetStyle(selectedStateFeature);
            }
            selectedStateFeature = layer;
            layer.setStyle({ fillOpacity: 0.5, color: '#ef4444', weight: 4 });
            
            // Actualizar UI
            const name = feature.properties.name;
            const activeLabel = document.getElementById('active-state');
            activeLabel.innerText = "📍 " + name;
            activeLabel.classList.remove('hidden');
            
            map.fitBounds(layer.getBounds(), { padding: [20, 20] });
            showStateGroup(name);
        }

        function updateMapVisuals() {
            const zoom = map.getZoom();
            clusterLayer.clearLayers();
            markersLayer.clearLayers();

            if (zoom < 7) {
                // Mostrar Badges por Estado
                Object.keys(stateCenters).forEach(state => {
                    const count = vimFullData.filter(d => d.estado === state).length;
                    const badge = L.marker(stateCenters[state], {
                        icon: L.divIcon({
                            className: 'state-badge',
                            html: `<div>${count}</div>`,
                            iconSize: [36, 36]
                        })
                    });
                    badge.on('click', () => showStateGroup(state));
                    badge.addTo(clusterLayer);
                });
            } else {
                // Mostrar Pines Individuales
                vimFullData.forEach(item => {
                    if (item.coords) {
                        const marker = L.circleMarker(item.coords, {
                            radius: 8,
                            fillColor: "#ef4444",
                            color: "#fff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.9
                        });
                        marker.on('click', () => renderCards(item.estado, [item], item.id));
                        marker.addTo(markersLayer);
                    }
                });
            }
        }

        function showStateGroup(stateName) {
            const query = normalize(stateName);
            const matches = vimFullData.filter(d => normalize(d.estado).includes(query) || query.includes(normalize(d.estado)));
            renderCards(stateName, matches);
        }

        function renderCards(title, items, highlightId = null) {
            const container = document.getElementById('results-area');
            const welcome = document.getElementById('welcome-box');
            
            welcome.classList.add('hidden');
            container.classList.remove('hidden');
            container.innerHTML = `<h2 class="text-2xl font-black text-slate-800 border-b-4 border-red-50 pb-2 mb-6 flex items-center gap-2">
                <span class="w-2 h-6 bg-red-600 rounded-full"></span> ${title}
            </h2>`;
            
            items.forEach(item => {
                const card = document.createElement('div');
                const isH = highlightId === item.id;
                card.className = `leader-card bg-white rounded-3xl p-6 border shadow-sm mb-4 ${isH ? 'ring-4 ring-red-500/20' : 'border-slate-100'}`;
                
                let redesHtml = "";
                if (item.redes && item.redes.length > 0) {
                    item.redes.forEach(link => {
                        redesHtml += `
                        <a href="${link}" target="_blank" class="social-link">
                            <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M22.675 0h-21.35c-.732 0-1.325.593-1.325 1.325v21.351c0 .731.593 1.324 1.325 1.324h11.495v-9.294h-3.128v-3.622h3.128v-2.671c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12v9.293h6.116c.73 0 1.323-.593 1.323-1.325v-21.35c0-.732-.593-1.325-1.325-1.325z"/></svg>
                            Ver Red Social
                        </a>`;
                    });
                }

                card.innerHTML = `
                    <div class="mb-4">
                        <span class="text-[9px] font-black uppercase text-red-500 tracking-widest bg-red-50 px-2 py-0.5 rounded inline-block">Sede ${item.sede}</span>
                        <h3 class="text-xl font-bold text-slate-800 mt-1">${item.lider}</h3>
                    </div>
                    <div class="space-y-4">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 bg-slate-100 rounded-full flex items-center justify-center text-slate-400">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                            </div>
                            <a href="tel:${item.tel}" class="text-sm font-black text-red-600 hover:underline transition-all">${item.tel}</a>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 shadow-inner">
                            <p class="text-[10px] text-slate-400 font-black uppercase mb-1 flex items-center gap-2 italic">Entrenamiento</p>
                            <p class="text-[11px] text-slate-700 leading-snug font-medium">${item.ent}</p>
                        </div>
                        <div class="flex flex-wrap gap-4 pt-3 border-t border-slate-100">
                            ${redesHtml || '<span class="text-[10px] text-slate-400 italic">Redes no disponibles</span>'}
                            ${item.correo !== "No disponible" ? `<a href="mailto:${item.correo}" class="text-[11px] font-bold text-slate-500 hover:text-red-600 transition-colors italic">Enlace Email</a>` : ''}
                        </div>
                    </div>
                `;
                container.appendChild(card);
                if(isH) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            });
        }

        function filterDirectory() {
            const input = normalize(document.getElementById('searchInput').value);
            if (input.length < 2) return;
            const results = vimFullData.filter(d => 
                normalize(d.lider).includes(input) || 
                normalize(d.estado).includes(input) || 
                normalize(d.sede).includes(input)
            );
            renderCards("Filtrado", results);
        }

        function loadVirtual() {
            renderCards("Nacional Virtual", [virtualLeader]);
        }

        window.onload = initApp;
    </script>
</body>
</html>
